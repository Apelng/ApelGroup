<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .popup {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8); /* Semi-transparent black overlay */
            
            
        }
        
        .popup img {
            width: 100%;
            height: 80%;
            object-fit: contain;
            object-position: center;
            margin: 0;
            padding: 0;
        }
        
        /* Hide the close button as we're using the parent's close button */
        .close {
            display: none !important;
        }
        
        @media (max-width: 768px) {
            .popup img {
                width: 100%;
                height: 80%;
                object-fit: contain;
                object-position: center;

            }

            
        }
    </style>
</head>
<body>
 <a href="https://linktr.ee/ApelCapitalRegistrars" target="_blank"><div id="popup" class="popup">
     <img src="https://res.cloudinary.com/apelng/image/upload/v1762437903/The_initiate_Offer_ss3eez.jpg" alt="Apel Financial Services" >
</div></a>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  const app = initializeApp({ /* your firebase config */ });
  const db  = getFirestore(app);
  // e.g. read gallery:
  const snap = await getDocs(query(collection(db, "sites", "SITE_ID", "gallery"), orderBy("order")));
  snap.forEach(doc => console.log(doc.data()));
</script></body>
</html>
